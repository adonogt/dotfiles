# term
term xterm-256color

# ── window ────────────────────────────────────────────────────────────────────
# 0.94 matches waybar background opacity for visual consistency
# blur in hyprland will show through if configured
window_padding_width    16
background_opacity      0.94

# ── font ──────────────────────────────────────────────────────────────────────
font_family      JetBrainsMono Nerd Font Mono
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        11.0

# ── cursor ────────────────────────────────────────────────────────────────────
# beam is less aggressive than block, no blink keeps things calm
cursor                #c8c8c8
cursor_text_color     background
cursor_shape          beam
cursor_blink_interval 0

# ── selection ─────────────────────────────────────────────────────────────────
selection_background  #2c2c2c
selection_foreground  #e0e0e0

# ── url ───────────────────────────────────────────────────────────────────────
url_style single

# ── colors ───────────────────────────────────────────────────────────────────
# neutral dark palette — no gruvbox warm tones
# same base as waybar: bg #0d0d0d, fg #c0c0c0

background  #0d0d0d
foreground  #c0c0c0

# normal colors
# 0 black — slightly lifted from bg, used for ui chrome
color0   #1c1c1c
# 1 red — muted, matches waybar critical family
color1   #c06060
# 2 green — desaturated sage
color2   #7a9f7a
# 3 yellow — muted amber, matches waybar warning family
color3   #c49060
# 4 blue — steel, cool neutral
color4   #6888a8
# 5 magenta — dusty purple, low saturation
color5   #9878a8
# 6 cyan — muted teal
color6   #6898a0
# 7 white — readable mid-gray
color7   #9e9e9e

# bright colors — same hues, slightly more visible
color8   #363636
color9   #d07070
color10  #8aaf8a
color11  #d4a070
color12  #78a0c0
color13  #a888b8
color14  #78a8b0
color15  #e0e0e0
