general {
    disable_loading_bar = true
    hide_cursor         = true
    grace               = 0
    no_fade_in          = false
}

# blurs the current screen content — more organic than showing the wallpaper
background {
    monitor     =
    path        = screenshot
    blur_passes = 3
    blur_size   = 5
    brightness  = 0.50
    contrast    = 1.0
    vibrancy    = 0.15
}

# time — same size and color as waybar clock
label {
    monitor       =
    text          = cmd[update:1000] echo "$(date +'%H:%M')"
    font_size     = 80
    font_family   = JetBrainsMono Nerd Font Mono
    color         = rgba(e2e2e2ff)
    shadow_passes = 0
    position      = 0, 80
    halign        = center
    valign        = center
}

# date — dimmer, same treatment as clock date in waybar
label {
    monitor       =
    text          = cmd[update:1000] echo "$(date +'%a %d')"
    font_size     = 16
    font_family   = JetBrainsMono Nerd Font Mono
    color         = rgba(b8b8b880)
    shadow_passes = 0
    position      = 0, 10
    halign        = center
    valign        = center
}

# password input
input-field {
    monitor           =
    size              = 260, 44
    outline_thickness = 1
    dots_size         = 0.22
    dots_spacing      = 0.18
    dots_center       = true
    outer_color       = rgba(686868bb)
    inner_color       = rgba(0d0d0dee)
    font_color        = rgba(e2e2e2ff)
    fade_on_empty     = true
    placeholder_text  =
    hide_input        = false
    rounding          = 8
    position          = 0, -100
    halign            = center
    valign            = center
}
