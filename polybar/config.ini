[colors]
background     = #00
background-alt = #3306080a
primary        = #fff
alert          = #FF4621
disabled       = #70788000

[bar/main]
width            = 100%
height           = 24pt
radius           = 8
background       = ${colors.background}
foreground       = ${colors.foreground}
line-size        = 3pt
border-size      = 4pt
border-color     = #00000000
padding-left     = 1
padding-right    = 1
module-margin    = 1
separator        =  
separator-foreground = ${colors.disabled}
font-0           = FiraCode Nerd Font:size=11;1
font-1           = Noto Sans CJK JP:size=11;1
font-2           = Noto Sans CJK JP:size=9;1
font-3           = FiraCode Nerd Font:size=15;3
modules-left     = logo i3
modules-center   = date
modules-right    = pulseaudio fcitx5 bluetooth battery wlan
cursor-click     = pointer
cursor-scroll    = ns-resize
enable-ipc       = true

[module/logo]
type             = custom/text
content 	 = " "
content-background = ${colors.background}
content-padding  = 1

[module/i3]
type             = internal/i3
index-sort       = true
enable-click     = true
enable-scroll    = false

ws-icon-0  = 1;一
ws-icon-1  = 2;二
ws-icon-2  = 3;三
ws-icon-3  = 4;四
ws-icon-4  = 5;五
ws-icon-5  = 6;六
ws-icon-6  = 7;七
ws-icon-7  = 8;八
ws-icon-8  = 9;九
ws-icon-9  = 10;十

label-focused            = %icon%
label-focused-background = ${colors.background-alt}
label-focused-underline  = ${colors.primary}
label-focused-padding    = 1

label-unfocused          = %icon%
label-unfocused-padding  = 1

label-urgent             = %icon%
label-urgent-background  = ${colors.alert}
label-urgent-padding     = 1

label-visible            = %icon%
label-visible-foreground = ${colors.disabled}
label-visible-padding    = 1

; Click = show full date, default = HH:MM
[module/date]
type             = internal/date
interval         = 1
date             = %H:%M
date-alt         = %Y年%m月%d日  %H:%M:%S
label            = %{T4}%date%%{T-}
label-foreground = ${colors.primary}

[module/pulseaudio]
type                      = custom/script
exec                      = vol=$(pactl get-sink-volume @DEFAULT_SINK@ | grep -oP '\d+(?=%)' | head -1); mute=$(pactl get-sink-mute @DEFAULT_SINK@ | grep -o 'yes'); if [ "$mute" = "yes" ]; then echo "󰖁"; elif [ "$vol" -lt 30 ]; then echo "󰕿 $vol%"; elif [ "$vol" -lt 70 ]; then echo "󰖀 $vol%"; else echo "󰕾 $vol%"; fi
interval                  = 1
click-right               = pactl set-sink-mute @DEFAULT_SINK@ toggle
scroll-up                 = pactl set-sink-volume @DEFAULT_SINK@ +5%
scroll-down               = pactl set-sink-volume @DEFAULT_SINK@ -5%
label-foreground          = ${colors.primary}

; Keyboard — flag emoji
; If flags don't show, install: sudo pacman -S noto-fonts-emoji
; To debug run in terminal: fcitx5-remote -n
[module/fcitx5]
type          = custom/script
exec          = name=$(fcitx5-remote -n 2>/dev/null); case "$name" in *mozc*) echo "JP";; *) echo "EN";; esac
interval      = 1
label-foreground = ${colors.primary}

; Bluetooth — shows 󰂯 when on, 󰂲 when off
; Requires: bluetoothctl (bluez package)
[module/bluetooth]
type          = custom/script
exec          = echo "show" | bluetoothctl 2>/dev/null | grep -q "Powered: yes" && echo "󰂯" || echo "󰂲"
interval      = 5
label-foreground = ${colors.primary}
click-left    = kitty -e bluetui

; Battery — icon only, no percentage
[module/battery]
type                         = internal/battery
battery                      = BAT0
adapter                      = ADP1
full-at                      = 99
low-at                       = 5
poll-interval                = 5
format-charging              = <label-charging>
format-discharging           = <ramp-capacity>
format-full                  = 󰁹
label-charging               = 󰂄
label-charging-foreground    = ${colors.primary}
label-full-foreground        = ${colors.primary}
ramp-capacity-0              = 󰁺
ramp-capacity-1              = 󰁼
ramp-capacity-2              = 󰁾
ramp-capacity-3              = 󰂀
ramp-capacity-4              = 󰂁
ramp-capacity-0-foreground   = ${colors.alert}
ramp-capacity-1-foreground   = ${colors.alert}
ramp-capacity-2-foreground   = ${colors.primary}
ramp-capacity-3-foreground   = ${colors.primary}
ramp-capacity-4-foreground   = ${colors.primary}

; WiFi — name only
[module/wlan]
type                  = internal/network
interface-type        = wireless
interval              = 5
format-connected      = <label-connected>
label-connected       = %essid%
label-connected-foreground = ${colors.primary}
format-disconnected   = <label-disconnected>
label-disconnected    = offline
label-disconnected-foreground = ${colors.disabled}

[settings]
screenchange-reload = true
pseudo-transparency = true

; vim:ft=dosini
