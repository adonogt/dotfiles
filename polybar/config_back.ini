[colors]
background     = #00
background-alt = #3306080a
primary        = #fff
alert          = #FF4621
disabled       = #70788000

[bar/main]
width            = 100%
height           = 24pt
radius           = 8
background       = ${colors.background}
foreground       = ${colors.foreground}
line-size        = 3pt
border-size      = 4pt
border-color     = #00000000
padding-left     = 1
padding-right    = 1
module-margin    = 1
separator        =  
separator-foreground = ${colors.disabled}
font-0           = FiraCode Nerd Font:size=11;1
font-1           = Noto Sans CJK JP:size=11;1
modules-left     = logo i3
modules-center   = date
modules-right    = pulseaudio wlan fcitx5 battery
cursor-click     = pointer
cursor-scroll    = ns-resize
enable-ipc       = true

[module/logo]
type             = custom/text
content          = " "
content-background = ${colors.background}
content-padding  = 1

[module/i3]
type             = internal/i3
index-sort       = true
enable-click     = true
enable-scroll    = false

ws-icon-0  = 1;一
ws-icon-1  = 2;二
ws-icon-2  = 3;三
ws-icon-3  = 4;四
ws-icon-4  = 5;五
ws-icon-5  = 6;六
ws-icon-6  = 7;七
ws-icon-7  = 8;八
ws-icon-8  = 9;九
ws-icon-9  = 10;十

label-focused            = %icon%
label-focused-background = ${colors.background-alt}
label-focused-underline  = ${colors.primary}
label-focused-padding    = 1

label-unfocused          = %icon%
label-unfocused-padding  = 1

label-urgent             = %icon%
label-urgent-background  = ${colors.alert}
label-urgent-padding     = 1

label-visible            = %icon%
label-visible-foreground = ${colors.disabled}
label-visible-padding    = 1

[module/date]
type             = internal/date
interval         = 1
date             = %H:%M
date-alt         = %Y-%m-%d %H:%M:%S
label            = %date%
label-foreground = ${colors.primary}

[module/pulseaudio]
type                      = internal/pulseaudio
format-volume             = <ramp-volume> <label-volume>
label-volume              = %percentage%%
label-volume-foreground   = ${colors.primary}
ramp-volume-0             = 󰕿
ramp-volume-1             = 󰖀
ramp-volume-2             = 󰕾
ramp-volume-foreground    = ${colors.primary}
label-muted               = 󰖁
label-muted-foreground    = ${colors.disabled}

[module/wlan]
type                  = internal/network
interface-type        = wireless
interval              = 5
format-connected      = <label-connected>
label-connected       = 󰤨 %essid%
label-connected-foreground = ${colors.primary}
format-disconnected   = <label-disconnected>
label-disconnected    = 󰤭
label-disconnected-foreground = ${colors.disabled}

[module/fcitx5]
type          = custom/script
exec          = fcitx5-remote -n 2>/dev/null | sed 's/.*mozc.*/JP/;s/.*keyboard.*/EN/'
interval      = 1
format-prefix = "󰌌 "
format-prefix-foreground = ${colors.primary}
label-foreground = ${colors.primary}

[module/battery]
type                       = internal/battery
battery                    = BAT0
adapter                    = ADP1
full-at                    = 99
low-at                     = 5
poll-interval              = 5
format-charging            = <label-charging>
format-discharging         = <ramp-capacity> <label-discharging>
format-full                = 󰁹 <label-full>
format-full-foreground     = #76FC5D
format-charging-foreground = #FFEB4D
label-charging             = 󰂄 %percentage%%
label-discharging          = %percentage%%
label-full                 = 100%
ramp-capacity-0            = 󰁺
ramp-capacity-1            = 󰁼
ramp-capacity-2            = 󰁾
ramp-capacity-3            = 󰂀
ramp-capacity-4            = 󰂁
ramp-capacity-0-foreground = ${colors.alert}
ramp-capacity-1-foreground = ${colors.alert}

[settings]
screenchange-reload = true
pseudo-transparency = true

; vim:ft=dosini
